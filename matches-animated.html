<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: sans-serif; padding: 12px; background: #f5f5f5; color: #333; font-size: 12px; margin: 0; }
  .title { font-size: 14px; font-weight: 700; margin: 8px 0 4px; }
  .btn-row { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; align-items: center; }
  button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .btn-next { background: #2980b9; color: white; }
  .btn-auto { background: #27ae60; color: white; }
  .btn-auto.playing { background: #e74c3c; }
  .btn-reset { background: #95a5a6; color: white; }
  .result-box { background: #e74c3c; color: white; border-radius: 6px; padding: 4px 12px; font-size: 14px; font-weight: 700; }
  .info { background: white; border-radius: 8px; padding: 8px 12px; margin: 6px 0; font-size: 11px; line-height: 1.8; min-height: 70px; border-left: 4px solid #2980b9; }
  .step-ctr { font-size: 11px; color: #888; margin: 2px 0 6px; }

  .top-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-start; }
  .panel { flex: 1; min-width: 200px; }
  .sec-title { font-size: 10px; font-weight: 600; margin-bottom: 4px; padding: 2px 8px; border-radius: 4px; display: inline-block; }

  /* Match grid canvas */
  canvas { border: 1px solid #ddd; border-radius: 6px; background: white; }

  /* DP tables */
  .grid { display: grid; gap: 2px; margin: 4px 0; }
  .cell { width: 38px; height: 32px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; border-radius: 3px; border: 1.5px solid #ccc; transition: all 0.25s; }
  .lbl { background: none !important; border: none !important; color: #888; font-size: 9px; font-weight: 400; }
  .base { background: #f0f0f0; color: #aaa; font-size: 9px; }
  .r-val { background: #2980b9; color: white; }
  .r-zero { background: #FADBD8; color: #922b21; }
  .r-cur { background: #F39C12; color: white; border: 2px solid #ca6f1e !important; }
  .d-val { background: #8e44ad; color: white; }
  .d-zero { background: #FADBD8; color: #922b21; }
  .d-cur { background: #27ae60; color: white; border: 2px solid #1e8449 !important; }
  .check-hi { background: #1a5276; color: white; border: 2px solid #0d2b40 !important; }
</style>
</head>
<body>

<div class="title">🔥 Largest Square of Matches 动画</div>

<div class="btn-row">
  <button class="btn-next" onclick="nextStep()">▶ 下一步</button>
  <button class="btn-auto" id="autoBtn" onclick="toggleAuto()">⚡ 自动</button>
  <button class="btn-reset" onclick="reset()">↺ 重置</button>
  <span style="font-size:12px;color:#555;margin-left:8px">最大边长：<span class="result-box" id="resultBox">0</span></span>
</div>
<div class="step-ctr" id="stepCtr">步骤 0 / 25</div>
<div class="info" id="info">
  <b>题意：</b>每个点的值代表有没有火柴<br>
  0=无右无下　1=有右→　2=有下↓　3=有右有下→↓<br>
  找四条边都由火柴组成的最大正方形！
</div>

<div class="top-row">
  <div class="panel">
    <div class="sec-title" style="background:#2c3e50;color:white">火柴矩阵（点击自动播放看动画）</div>
    <canvas id="matchCanvas" width="280" height="280"></canvas>
    <div style="font-size:10px;color:#666;margin-top:4px">
      <span style="color:#e74c3c">红色→</span>=右边有火柴　
      <span style="color:#2980b9">蓝色↓</span>=下边有火柴
    </div>
  </div>
  <div class="panel">
    <div class="sec-title" style="background:#2980b9;color:white">right[i][j]（从左上角往右连续有火柴）</div>
    <div class="grid" id="rightGrid" style="grid-template-columns:repeat(6,38px)"></div>
  </div>
  <div class="panel">
    <div class="sec-title" style="background:#8e44ad;color:white">down[i][j]（从左上角往下连续有火柴）</div>
    <div class="grid" id="downGrid" style="grid-template-columns:repeat(6,38px)"></div>
  </div>
</div>

<script>
// 5x5 matrix of match values
// 0=none, 1=right, 2=down, 3=both
const M = 5, N = 5;
const matrix = [
  [3,1,3,0,1],
  [2,0,0,2,0],
  [3,1,3,0,0],
  [2,0,2,0,0],
  [1,1,0,0,0],
];

// Helper functions
const hasRight = v => (v & 1) !== 0;
const hasDown  = v => (v & 2) !== 0;
const hasBoth  = v => v === 3;

let right, down, stepIndex, result, autoTimer;
const CELL = 50, PAD = 20;

function init() {
  right = Array.from({length:M}, ()=>new Array(N).fill(0));
  down  = Array.from({length:M}, ()=>new Array(N).fill(0));
  stepIndex = 0; result = 0;
}

// Draw match grid
function drawMatches(curI=-1, curJ=-1, sqI=-1, sqJ=-1, sqK=0) {
  const cv = document.getElementById('matchCanvas');
  const ctx = cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);

  // Draw square highlight first
  if(sqK > 0) {
    ctx.fillStyle = 'rgba(243,156,18,0.15)';
    const x = PAD + sqJ*CELL;
    const y = PAD + sqI*CELL;
    ctx.fillRect(x, y, sqK*CELL, sqK*CELL);
  }

  // Draw dots and matches
  for(let i=0;i<M;i++) {
    for(let j=0;j<N;j++) {
      const x = PAD + j*CELL;
      const y = PAD + i*CELL;
      const v = matrix[i][j];

      // Right match
      if(hasRight(v)) {
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x+6, y);
        ctx.lineTo(x+CELL-6, y);
        ctx.stroke();
      }

      // Down match
      if(hasDown(v)) {
        ctx.strokeStyle = '#2980b9';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, y+6);
        ctx.lineTo(x, y+CELL-6);
        ctx.stroke();
      }

      // Square border highlight
      if(sqK > 0) {
        const si = sqI, sj = sqJ;
        const onBorder = (
          (i===si && j>=sj && j<sj+sqK) ||
          (i===si+sqK && j>=sj && j<=sj+sqK) ||
          (j===sj && i>=si && i<=si+sqK) ||
          (j===sj+sqK && i>=si && i<=si+sqK)
        );
        if(onBorder) {
          ctx.fillStyle = '#F39C12';
          ctx.beginPath();
          ctx.arc(x, y, 7, 0, Math.PI*2);
          ctx.fill();
        }
      }

      // Dot
      const isCur = i===curI && j===curJ;
      ctx.fillStyle = isCur ? '#e74c3c' : '#2c3e50';
      ctx.beginPath();
      ctx.arc(x, y, isCur ? 7 : 5, 0, Math.PI*2);
      ctx.fill();

      // Label
      ctx.fillStyle = '#888';
      ctx.font = '9px sans-serif';
      ctx.fillText(`(${i},${j})=${v}`, x-12, y+18);
    }
  }
}

function buildTables() {
  ['rightGrid','downGrid'].forEach((id,idx) => {
    const g = document.getElementById(id);
    g.innerHTML = '';
    g.appendChild(lbl(''));
    for(let j=0;j<N;j++) g.appendChild(lbl(`j${j}`));
    for(let i=0;i<M;i++) {
      g.appendChild(lbl(`i${i}`));
      for(let j=0;j<N;j++) {
        const d = document.createElement('div');
        d.className = 'cell base';
        d.id = `${idx===0?'r':'d'}_${i}_${j}`;
        d.textContent = '0';
        g.appendChild(d);
      }
    }
  });
}

function lbl(t) {
  const d = document.createElement('div');
  d.className = 'cell lbl'; d.textContent = t; return d;
}

function setCls(id, cls, val) {
  const el = document.getElementById(id);
  if(!el) return;
  el.className = `cell ${cls}`;
  if(val !== undefined) el.textContent = val;
}

// Steps go RIGHT to LEFT, BOTTOM to TOP (since right depends on j+1, down depends on i+1)
// Build step order: from bottom-right to top-left
const steps = [];
for(let i=M-1;i>=0;i--)
  for(let j=N-1;j>=0;j--)
    steps.push({i,j});

function nextStep() {
  if(stepIndex >= M*N) return;
  const {i,j} = steps[stepIndex];
  const v = matrix[i][j];

  // Compute right[i][j]
  const rv = hasRight(v) ? (j+1<N ? right[i][j+1]+1 : 1) : 0;
  right[i][j] = rv;

  // Compute down[i][j]
  const dv = hasDown(v) ? (i+1<M ? down[i+1][j]+1 : 1) : 0;
  down[i][j] = dv;

  // Check for squares (top-left corner at (i,j))
  const maxK = Math.min(rv, dv);
  let foundK = 0;
  let checkHtml = '';

  for(let k=maxK;k>=1;k--) {
    // bottom-right corner would be at (i+k, j+k)
    // check: right arm from bottom-left (i+k, j) >= k
    // check: down arm from top-right (i, j+k) >= k
    if(i+k >= M || j+k >= N) continue;
    const bl = down[i+k]?.[j] ?? 0;   // bottom-left down arm... wait
    // Actually: top-left corner (i,j), check bottom-left (i+k,j)->right and top-right (i,j+k)->down
    const blRight = right[i+k]?.[j] ?? 0;
    const trDown  = down[i]?.[j+k] ?? 0;
    const ok = blRight >= k && trDown >= k;
    checkHtml += `k=${k}: 左下right[${i+k}][${j}]=${blRight}≥${k}?${blRight>=k?'✅':'❌'} 右上down[${i}][${j+k}]=${trDown}≥${k}?${trDown>=k?'✅':'❌'}<br>`;
    if(ok) { foundK = k; break; }
  }

  if(foundK > result) result = foundK;
  document.getElementById('resultBox').textContent = result;

  // Draw
  drawMatches(i, j, foundK>0?i:-1, foundK>0?j:-1, foundK);

  // Update tables
  setCls(`r_${i}_${j}`, 'r-cur', rv);
  setCls(`d_${i}_${j}`, 'd-cur', dv);
  setTimeout(()=>{
    setCls(`r_${i}_${j}`, rv===0?'r-zero':'r-val', rv);
    setCls(`d_${i}_${j}`, dv===0?'d-zero':'d-val', dv);
  }, 400);

  let infoHtml = `<b>(${i},${j}) 值=${v}</b>　hasRight=${hasRight(v)?'✅':'❌'}　hasDown=${hasDown(v)?'✅':'❌'}<br>`;
  infoHtml += `<span style="color:#2980b9">right[${i}][${j}] = ${rv}</span>　<span style="color:#8e44ad">down[${i}][${j}] = ${dv}</span>　maxK=min(${rv},${dv})=${maxK}<br>`;
  infoHtml += checkHtml || '<span style="color:#aaa">maxK=0，跳过检查</span>';
  if(foundK>0) infoHtml += `<b style="color:#27ae60">→ 找到边长${foundK}的火柴正方形！result=${result}</b>`;

  document.getElementById('info').innerHTML = infoHtml;
  stepIndex++;
  document.getElementById('stepCtr').textContent = `步骤 ${stepIndex} / ${M*N}`;

  if(stepIndex >= M*N) {
    stopAuto();
    document.getElementById('info').innerHTML += `<br><b style="color:#e74c3c">✅ 完成！最大火柴正方形边长 = ${result}</b>`;
  }
}

function reset() {
  stopAuto(); init(); buildTables();
  drawMatches();
  document.getElementById('resultBox').textContent = '0';
  document.getElementById('info').innerHTML = '<b>题意：</b>每个点的值代表有没有火柴<br>0=无右无下　1=有右→　2=有下↓　3=有右有下→↓<br>找四条边都由火柴组成的最大正方形！';
  document.getElementById('stepCtr').textContent = `步骤 0 / ${M*N}`;
}

function toggleAuto() {
  autoTimer ? stopAuto() : startAuto();
}
function startAuto() {
  const b = document.getElementById('autoBtn');
  b.textContent='⏸ 暂停'; b.classList.add('playing');
  autoTimer = setInterval(()=>{ if(stepIndex>=M*N){stopAuto();return;} nextStep(); }, 800);
}
function stopAuto() {
  clearInterval(autoTimer); autoTimer=null;
  const b = document.getElementById('autoBtn');
  b.textContent='⚡ 自动'; b.classList.remove('playing');
}

init(); buildTables(); drawMatches();
</script>
</body>
</html>
